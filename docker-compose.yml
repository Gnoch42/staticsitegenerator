# ─────────────────────────────────────────────────────────────
#  CV site generator — two services, one shared volume.
#
#  Usable locally (`docker compose up`) AND as a reference for
#  configuring two separate resources in Coolify.
#
#  Coolify constraints respected:
#   - a single internal port exposed per service (no `ports:`)
#   - HTTP routing is handled by Traefik via Coolify labels
#   - each Dockerfile is standalone / independently buildable
# ─────────────────────────────────────────────────────────────

services:
  # ── SERVICE 1: editing + generation app (Start/Stop on demand) ──
  cv-generator:
    build:
      context: ./generator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
      DATA_DIR: ${DATA_DIR:-/data}
      DATABASE_PATH: ${DATABASE_PATH:-/data/cv.db}
      SITE_OUTPUT_DIR: ${SITE_OUTPUT_DIR:-/data/site}
      PORT: ${PORT:-3000}
      INTERNAL_BASE_URL: ${INTERNAL_BASE_URL:-http://127.0.0.1:3000}
      NODE_ENV: production
    volumes:
      - shared-data:/data
    expose:
      - "3000"
    # Local only — uncomment to reach the admin directly:
    # ports:
    #   - "3000:3000"

  # ── SERVICE 2: static Caddy server (always on) ──
  cv-site:
    build:
      context: ./site
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - shared-data:/data:ro
    expose:
      - "80"
    # Local only — uncomment to visit the published site:
    # ports:
    #   - "8080:80"

volumes:
  shared-data:
